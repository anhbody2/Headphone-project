services:
  # ======================
  # BACKEND (Laravel API)
  # ======================
  backend-app:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    container_name: backend_app
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql

  backend-nginx:
    image: nginx:alpine
    container_name: backend_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www:delegated
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-app

  # ======================
  # FRONTEND (React)
  # ======================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
  # ======================
  # DATABASE
  # ======================
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - headphonedb:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  headphonedb:
    external: true
